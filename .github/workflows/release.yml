name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - uses: astral-sh/setup-uv@v4

      - run: uv run flet build macos --product "IDX Helper"

      - name: Zip the app
        run: |
          cd build/macos
          zip -r IDX-Helper-macOS.zip *.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos/IDX-Helper-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - uses: astral-sh/setup-uv@v4

      - run: uv run flet build windows --product "IDX Helper"

      - name: Zip the app
        run: Compress-Archive -Path build/windows/* -DestinationPath build/windows/IDX-Helper-Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/IDX-Helper-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-build/IDX-Helper-macOS.zip
            windows-build/IDX-Helper-Windows.zip
